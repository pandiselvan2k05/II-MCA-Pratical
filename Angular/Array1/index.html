<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="flex justify-center items-center h-screen">
        <div class="w-200 h-90 gap-5  grid grid-cols-2">
            <div class="m-5 w-90 h-90 border-2 rounded-xl bg-[#E566FF]">
                <h1 class="text-center text-2xl text-white font-bold mt-3">Array</h1>
                <input type="text" placeholder="Enter the num" id="num" class="border-2 h-10 m-5 bg-white rounded-xl p-2 w-80">
                <div>
                    <button class="border-2 w-80 h-10 b-2 m-2 ml-4 bg-[#FF3333] cursor-pointer text-white rounded-xl hover:text-black hover:bg-[#47CC00] border-2 border-black transaction hover:scale-105 " onclick="Add()">Add</button>
                </div>
                <div id="button" class="m-7 p-3">
                </div>
            </div>
            <div class="m-5 w-80 h-90 border-2 rounded-xl bg-black">
                <div class="m-5 text-2xl font-bold text-white">
                    Result : 
                </div>
                <div class="border-2 bg-white w-70 h-60 rounded-xl m-5 border-red-600 border-4 p-2">
                    <div class="ml-3 text-xl font-bold text-black" id="name">
                        
                    </div>
                    <div class="ml-3 p-2 text-xl text-[#020033]" id="res">
                        
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
