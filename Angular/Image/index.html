<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="flex flex-col justify-center items-center h-screen bg-red-200" >
        <h1 class="text-xl text-red-500 ">Image Slider</h1>
        <div class="w-150 h-120">
            <img src="1.png" alt="" class="p-5" id="Img">
        </div>
        <div>
            <input type="radio" name="val" value="1" checked>
            <input type="radio" name="val" value="2">
            <input type="radio" name="val" id="3">
            <input type="radio" name="val" id="4">
            <input type="radio" name="val" id="5">
            <input type="radio" name="val" id="6">
            <input type="radio" name="val" id="7">
            <input type="radio" name="val" id="8">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
