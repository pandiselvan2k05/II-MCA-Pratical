<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="flex flex-col justify-center items-center h-screen" >
        
            <div id="Img" class="bg-[url(1.png)] bg-cover bg-center bg-no-repeat w-190 h-100 bg-red-200 relative">
                <div class="absolute bottom-0 flex gap-3 justify-center items-center h-16 w-full" id="Radio">
                    <input type="radio" name="image" value="1" checked>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
